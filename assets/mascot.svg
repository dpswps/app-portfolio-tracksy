<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#B794F6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4D1"/>
      <stop offset="100%" stop-color="#F4C9A8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Back leg -->
    <ellipse cx="78" cy="168" rx="14" ry="10" fill="#7C3AED" transform="rotate(20 78 168)"/>
    <rect x="68" y="135" width="18" height="34" rx="9" fill="#8B5CF6" transform="rotate(20 77 152)"/>

    <!-- Back arm -->
    <rect x="38" y="80" width="16" height="36" rx="8" fill="#7C3AED" transform="rotate(35 46 98)"/>

    <!-- Body -->
    <ellipse cx="100" cy="115" rx="48" ry="42" fill="url(#bodyGrad)"/>

    <!-- Front leg (raised, bent) -->
    <rect x="108" y="138" width="20" height="32" rx="10" fill="#8B5CF6" transform="rotate(-30 118 154)"/>
    <ellipse cx="135" cy="155" rx="14" ry="10" fill="#7C3AED" transform="rotate(-15 135 155)"/>

    <!-- Front arm -->
    <rect x="130" y="78" width="18" height="40" rx="9" fill="#8B5CF6" transform="rotate(-30 139 98)"/>
    <circle cx="155" cy="78" r="9" fill="#A78BFA"/>

    <!-- Head -->
    <g>
      <!-- Ears / horns -->
      <path d="M70 55 Q60 25 78 22 Q88 30 86 60 Z" fill="#8B5CF6"/>
      <path d="M130 55 Q140 25 122 22 Q112 30 114 60 Z" fill="#8B5CF6"/>
      <path d="M72 50 Q66 32 78 30 Q84 36 84 55 Z" fill="#A78BFA" opacity="0.7"/>
      <path d="M128 50 Q134 32 122 30 Q116 36 116 55 Z" fill="#A78BFA" opacity="0.7"/>

      <!-- Head circle -->
      <circle cx="100" cy="68" r="38" fill="#8B5CF6"/>

      <!-- Face plate -->
      <ellipse cx="100" cy="74" rx="28" ry="26" fill="url(#faceGrad)"/>

      <!-- Eyes -->
      <ellipse cx="89" cy="72" rx="3" ry="4" fill="#1F1F23"/>
      <ellipse cx="111" cy="72" rx="3" ry="4" fill="#1F1F23"/>
      <circle cx="90" cy="71" r="1" fill="#fff"/>
      <circle cx="112" cy="71" r="1" fill="#fff"/>

      <!-- Cheeks -->
      <ellipse cx="84" cy="82" rx="3.5" ry="2.2" fill="#F8A8B0" opacity="0.7"/>
      <ellipse cx="116" cy="82" rx="3.5" ry="2.2" fill="#F8A8B0" opacity="0.7"/>

      <!-- Mouth -->
      <path d="M95 86 Q100 91 105 86" stroke="#1F1F23" stroke-width="2" stroke-linecap="round" fill="none"/>
    </g>
  </g>
</svg>
